<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOZ CABIN — 癒しの部屋</title>
<style>
  :root {
    --copper: #c8834f;
    --copper-soft: #e0a978;
    --petrol: #2d524d;
    --text: #ede4d3;
    --text-sub: #b0a48f;
    --wood-dark: #150d07;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--wood-dark);
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    color: var(--text);
  }
  .cabin-bg {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: url("cabin-bg.jpg") center 52% / cover no-repeat;
  }
  .fire-glow {
    position: fixed;
    left: 58.8%;
    top: 59.8%;
    width: 90vw;
    height: 90vh;
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse 40% 45% at center,
                rgba(255,150,60,0.28) 0%,
                rgba(255,130,50,0.12) 35%,
                transparent 70%);
    mix-blend-mode: screen;
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.35; transform: translate(-50%, -50%) scale(1.0); }
    50%      { opacity: 1.0;  transform: translate(-50%, -50%) scale(1.06); }
  }
  .fire-flicker {
    position: fixed;
    left: 58.8%;
    top: 59.8%;
    width: 60vw;
    height: 60vh;
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse 30% 35% at center,
                rgba(255,170,80,0.18) 0%, transparent 65%);
    mix-blend-mode: screen;
    animation: flicker 0.14s steps(2) infinite;
  }
  @keyframes flicker {
    0%   { opacity: 0.5; }
    50%  { opacity: 0.85; }
    100% { opacity: 0.62; }
  }
  #embers {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 52%, transparent 35%, rgba(10,6,3,0.5) 85%, rgba(8,5,2,0.8) 100%);
  }
  .ui {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px;
  }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--copper-soft);
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  .room-title {
    margin-top: 8px;
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }
  .room-sub {
    margin-top: 10px;
    font-size: 0.85rem;
    color: var(--text-sub);
    max-width: 360px;
    line-height: 1.8;
    text-shadow: 0 1px 8px rgba(0,0,0,0.9);
  }
  .ui-bottom {
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: flex-start;
  }
  .controls {
    pointer-events: auto;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid rgba(224,169,120,0.4);
    background: rgba(30,18,10,0.7);
    color: var(--text);
    backdrop-filter: blur(6px);
    transition: all 0.2s ease;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--copper); background: rgba(50,32,18,0.85); }
  .btn-discord {
    background: rgba(45,82,77,0.6);
    border-color: rgba(120,180,170,0.4);
  }
  .btn-discord:hover { border-color: var(--petrol); background: rgba(45,82,77,0.85); }
  .hint {
    font-size: 0.72rem;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }
  .nav-back {
    pointer-events: auto;
    position: fixed;
    top: 28px;
    right: 28px;
    z-index: 6;
    font-size: 0.78rem;
    color: var(--text-sub);
    text-decoration: none;
    border: 1px solid rgba(176,164,143,0.3);
    padding: 8px 14px;
    border-radius: 4px;
    background: rgba(30,18,10,0.6);
    backdrop-filter: blur(6px);
  }
  .nav-back:hover { color: var(--copper); border-color: var(--copper); }
  .enter-gate {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: rgba(12,7,4,0.96);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    transition: opacity 0.9s ease;
  }
  .enter-gate.hidden { opacity: 0; pointer-events: none; }
  .enter-gate .g-eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--copper-soft);
    margin-bottom: 20px;
  }
  .enter-gate h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .enter-gate p {
    color: var(--text-sub);
    font-size: 0.9rem;
    line-height: 1.9;
    max-width: 420px;
    margin-bottom: 36px;
  }
  .enter-btn {
    padding: 16px 40px;
    background: var(--copper);
    color: var(--wood-dark);
    border: none;
    border-radius: 4px;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .enter-btn:hover { background: var(--copper-soft); }
</style>
</head>
<body>

<div class="cabin-bg"></div>
<div class="fire-glow"></div>
<div class="fire-flicker"></div>
<canvas id="embers"></canvas>
<div class="vignette"></div>

<a href="index.html" class="nav-back">← サイトへ戻る</a>

<div class="ui">
  <div class="ui-top">
    <div class="eyebrow">MOZ CABIN</div>
    <div class="room-title">癒しの部屋</div>
    <div class="room-sub">
      火にあたって、ひと息つく部屋です。<br>
      考えごとに疲れたら、どうぞ。
    </div>
  </div>
  <div class="ui-bottom">
    <div class="controls">
      <div class="btn" id="soundToggle">🔥 火の音を消す</div>
      <a href="https://discord.gg/e9QpVpPaR" target="_blank" rel="noopener" class="btn btn-discord">
        💬 カジュアルに相談する
      </a>
    </div>
    <div class="hint">火を眺めて、少し休んでいってください</div>
  </div>
</div>

<div class="enter-gate" id="enterGate">
  <div class="g-eyebrow">MOZ CABIN</div>
  <h1>火を入れておきました。<br>どうぞ、中へ。</h1>
  <p>暖炉のはぜる音が流れます。<br>音量にご注意ください。</p>
  <button class="enter-btn" id="enterBtn">中へ入る</button>
</div>

<audio id="fireAudio" loop preload="auto">
  <source src="healing-loop-raw.mp3" type="audio/mpeg">
</audio>

<script>
  const canvas = document.getElementById('embers');
  const ctx = canvas.getContext('2d');
  let W, H, fireX, fireY;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    fireX = W * 0.588;
    fireY = H * 0.598;
  }
  resize();
  window.addEventListener('resize', resize);

  const embers = [];
  function spawnEmber() {
    embers.push({
      x: fireX + (Math.random() - 0.5) * W * 0.08,
      y: fireY,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.5 + Math.random() * 1.1),
      life: 1,
      decay: 0.004 + Math.random() * 0.006,
      size: 1 + Math.random() * 1.8
    });
  }

  let frame = 0;
  function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    frame++;
    if (frame % 14 === 0 && embers.length < 22) spawnEmber();
    for (let i = embers.length - 1; i >= 0; i--) {
      const e = embers[i];
      e.x += e.vx;
      e.y += e.vy;
      e.vy -= 0.004;
      e.vx += (Math.random() - 0.5) * 0.05;
      e.life -= e.decay;
      if (e.life <= 0) { embers.splice(i, 1); continue; }
      const alpha = e.life * 0.9;
      const flick = 0.7 + Math.random() * 0.3;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, ${150 + Math.floor(e.life*80)}, 60, ${alpha * flick})`;
      ctx.shadowBlur = 6;
      ctx.shadowColor = 'rgba(255,140,40,0.8)';
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
  draw();

  const gate = document.getElementById('enterGate');
  const enterBtn = document.getElementById('enterBtn');
  const audio = document.getElementById('fireAudio');
  const soundToggle = document.getElementById('soundToggle');
  let soundOn = true;

  enterBtn.addEventListener('click', () => {
    gate.classList.add('hidden');
    audio.volume = 0.6;
    audio.play().catch(() => {
      soundOn = false;
      soundToggle.textContent = '🔇 火の音を出す';
    });
  });

  audio.addEventListener('timeupdate', () => {
    if (!soundOn) return;
    if (audio.duration && audio.currentTime > audio.duration - 0.3) {
      audio.currentTime = 0;
      audio.play().catch(()=>{});
    }
  });
  audio.addEventListener('ended', () => {
    if (soundOn) { audio.currentTime = 0; audio.play().catch(()=>{}); }
  });

  soundToggle.addEventListener('click', () => {
    soundOn = !soundOn;
    if (soundOn) {
      audio.play().catch(()=>{});
      soundToggle.textContent = '🔥 火の音を消す';
    } else {
      audio.pause();
      soundToggle.textContent = '🔇 火の音を出す';
    }
  });
</script>

</body>
</html>
