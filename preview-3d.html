<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOZ WORLD — Concept Preview</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0d1210;
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    height: 100%;
  }
  #scene {
    position: fixed;
    inset: 0;
  }
  .overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px;
    color: #e7e2d6;
  }
  .top-label {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #4a9fd8;
  }
  .title {
    margin-top: 10px;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700;
    letter-spacing: 0.02em;
    max-width: 560px;
  }
  .sub {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #9a9488;
    max-width: 420px;
    line-height: 1.7;
  }
  .hint {
    align-self: flex-end;
    font-size: 0.72rem;
    color: #6f6a5f;
    letter-spacing: 0.05em;
  }
  .badge {
    position: fixed;
    top: 32px;
    right: 32px;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: #4c6a63;
    border: 1px dashed #35443f;
    padding: 6px 12px;
    border-radius: 3px;
  }
</style>
</head>
<body>

<div id="scene"></div>

<div class="overlay">
  <div>
    <div class="top-label">Concept Preview — Not for Production</div>
    <div class="title">MOZ WORLD<br>(構想イメージ)</div>
    <div class="sub">
      将来的にコミュニティ/営業チームが集うプラットフォーム空間の、
      ごく初期の雰囲気テストです。実際の機能・見た目は未確定です。
    </div>
  </div>
  <div class="hint">ドラッグで視点を回転 ・ ホイールで拡大縮小</div>
</div>

<div class="badge">DRAFT 001</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const container = document.getElementById('scene');

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0d1210, 0.045);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 1.2, 9);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // ---- Lights ----
  const ambient = new THREE.AmbientLight(0x2a3530, 1.1);
  scene.add(ambient);

  const copperLight = new THREE.PointLight(0xd9451f, 1.4, 30);
  copperLight.position.set(4, 3, 4);
  scene.add(copperLight);

  const petrolLight = new THREE.PointLight(0x4a9fd8, 3.0, 30);
  petrolLight.position.set(-5, -2, -3);
  scene.add(petrolLight);

  // ---- Central emblem (MOZ Globe) ----
  const coreGroup = new THREE.Group();
  scene.add(coreGroup);

  // 地球本体:キャンバスで大陸っぽい模様を描いてテクスチャ化
  const earthCanvas = document.createElement('canvas');
  earthCanvas.width = 512; earthCanvas.height = 256;
  const ectx = earthCanvas.getContext('2d');
  // 海:宇宙から見た地球のような深い青のグラデーション
  const oceanGrad = ectx.createLinearGradient(0, 0, 0, 256);
  oceanGrad.addColorStop(0, '#0b3d66');
  oceanGrad.addColorStop(0.5, '#124f80');
  oceanGrad.addColorStop(1, '#0b3d66');
  ectx.fillStyle = oceanGrad;
  ectx.fillRect(0, 0, 512, 256);

  function blob(cx, cy, r, color) {
    ectx.fillStyle = color;
    ectx.beginPath();
    for (let a = 0; a < Math.PI * 2; a += 0.4) {
      const rr = r * (0.7 + Math.random() * 0.6);
      const x = cx + Math.cos(a) * rr;
      const y = cy + Math.sin(a) * rr * 0.6;
      a === 0 ? ectx.moveTo(x, y) : ectx.lineTo(x, y);
    }
    ectx.closePath();
    ectx.fill();
  }
  // 大陸:緑(植生)と茶(乾燥地帯)を混ぜたリアルな配色
  const landColors = ['#3d6b45', '#4a7a4f', '#7a6a42', '#5c7a3d'];
  const continentSeeds = [[80,80,38],[150,60,26],[120,150,30],[260,70,42],[300,140,34],[380,90,30],[420,160,26],[60,190,22],[220,190,28]];
  continentSeeds.forEach(([x,y,r], i) => blob(x, y, r, landColors[i % landColors.length]));
  const earthTexture = new THREE.CanvasTexture(earthCanvas);

  const coreGeo = new THREE.SphereGeometry(1.6, 48, 48);
  const coreMat = new THREE.MeshStandardMaterial({
    map: earthTexture,
    metalness: 0.25,
    roughness: 0.7
  });
  const coreMesh = new THREE.Mesh(coreGeo, coreMat);
  coreGroup.add(coreMesh);

  // 雲の層(薄い半透明の外殻)
  const cloudCanvas = document.createElement('canvas');
  cloudCanvas.width = 512; cloudCanvas.height = 256;
  const cctx = cloudCanvas.getContext('2d');
  cctx.clearRect(0,0,512,256);
  cctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i=0;i<40;i++){
    const cx = Math.random()*512, cy = Math.random()*256, r = 8+Math.random()*22;
    cctx.beginPath(); cctx.ellipse(cx,cy,r,r*0.4,0,0,Math.PI*2); cctx.fill();
  }
  const cloudTexture = new THREE.CanvasTexture(cloudCanvas);
  const cloudGeo = new THREE.SphereGeometry(1.63, 48, 48);
  const cloudMat = new THREE.MeshStandardMaterial({
    map: cloudTexture,
    transparent: true,
    opacity: 0.55,
    depthWrite: false
  });
  const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
  coreGroup.add(cloudMesh);

  // 大気のふちどり(淡いグロー)
  const wireGeo = new THREE.SphereGeometry(1.72, 32, 32);
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x8fc4e8,
    transparent: true,
    opacity: 0.15,
    side: THREE.BackSide
  });
  const wireMesh = new THREE.Mesh(wireGeo, wireMat);
  coreGroup.add(wireMesh);

  // ---- 衛星(メンバーを表す小球。タップ/ホバーで「ありがとう」を多言語表示) ----
  const satelliteWords = [
    'ありがとう','Thank you','Gracias','Merci','Danke','Grazie','Obrigado','谢谢','감사합니다','ขอบคุณ',
    'Terima kasih','Cảm ơn','शुक्रिया','شكراً','תודה','Спасибо','Dziękuję','Efharisto','Kiitos','Tack',
    'Dank je','Takk','Дякую','Köszönöm','Mulțumesc','Hvala','Ačiū','Aitäh','Paldies','Xièxiè',
    'Mahalo','Asante','Gracias totales','Obrigada','Cảm tạ','Terima kasih banyak'
  ];

  const satellites = [];
  const satGroup = new THREE.Group();
  scene.add(satGroup);

  const satColors = [0xd9451f, 0x1f5f8b, 0xea6b3f, 0x3a7fab];
  const ringRadii = [3.2, 4.4, 5.6];

  satelliteWords.forEach((word, i) => {
    const ring = i % ringRadii.length;
    const radius = ringRadii[ring];
    const angle = (i / satelliteWords.length) * Math.PI * 2 * (ring + 1);
    const tilt = (ring - 1) * 0.35;

    const satGeo = new THREE.SphereGeometry(0.09, 12, 12);
    const satMat = new THREE.MeshStandardMaterial({
      color: satColors[i % satColors.length],
      emissive: satColors[i % satColors.length],
      emissiveIntensity: 0.4,
      roughness: 0.4
    });
    const sat = new THREE.Mesh(satGeo, satMat);
    sat.userData = { word, radius, angle, tilt, speed: 0.15 + (ring * 0.05) };
    satGroup.add(sat);
    satellites.push(sat);
  });

  // ---- ホバーラベル(役職ワード表示) ----
  const raycaster = new THREE.Raycaster();
  const mousePos = new THREE.Vector2();
  const labelEl = document.createElement('div');
  labelEl.style.cssText = 'position:fixed;pointer-events:none;padding:6px 12px;background:rgba(20,26,23,0.85);color:#e7e2d6;font-family:"Hiragino Sans","Yu Gothic",sans-serif;font-size:0.78rem;letter-spacing:0.04em;border:1px solid rgba(224,169,120,0.4);border-radius:4px;opacity:0;transition:opacity 0.15s ease;z-index:20;white-space:nowrap;';
  document.body.appendChild(labelEl);

  window.addEventListener('mousemove', (e) => {
    mousePos.x = (e.clientX / window.innerWidth) * 2 - 1;
    mousePos.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mousePos, camera);
    const hits = raycaster.intersectObjects(satellites);
    if (hits.length > 0) {
      const word = hits[0].object.userData.word;
      labelEl.textContent = word;
      labelEl.style.left = (e.clientX + 14) + 'px';
      labelEl.style.top = (e.clientY - 10) + 'px';
      labelEl.style.opacity = '1';
    } else {
      labelEl.style.opacity = '0';
    }
  });

  function checkTap(x, y) {
    mousePos.x = (x / window.innerWidth) * 2 - 1;
    mousePos.y = -(y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mousePos, camera);
    const hits = raycaster.intersectObjects(satellites);
    if (hits.length > 0) {
      const word = hits[0].object.userData.word;
      labelEl.textContent = word;
      labelEl.style.left = Math.min(x + 14, window.innerWidth - 120) + 'px';
      labelEl.style.top = (y - 30) + 'px';
      labelEl.style.opacity = '1';
      clearTimeout(labelEl._hideTimer);
      labelEl._hideTimer = setTimeout(() => { labelEl.style.opacity = '0'; }, 1800);
    }
  }
  renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      checkTap(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: true });


  // ---- Ambient particle field ----
  const particleCount = 900;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    const radius = 6 + Math.random() * 14;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta) * 0.6;
    positions[i * 3 + 2] = radius * Math.cos(phi);
  }
  const particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0xea6b3f,
    size: 0.045,
    transparent: true,
    opacity: 0.6,
    sizeAttenuation: true
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // ---- Ground disc (subtle) ----
  const groundGeo = new THREE.CircleGeometry(8, 64);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x141a17,
    metalness: 0.2,
    roughness: 0.9,
    transparent: true,
    opacity: 0.7
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -2.4;
  scene.add(ground);

  // ---- Manual drag-orbit controls (no OrbitControls addon needed) ----
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let theta = 0.6, phi = 1.3;
  let radiusCam = 9;

  function updateCamera() {
    camera.position.x = radiusCam * Math.sin(phi) * Math.sin(theta);
    camera.position.y = radiusCam * Math.cos(phi) + 1.0;
    camera.position.z = radiusCam * Math.sin(phi) * Math.cos(theta);
    camera.lookAt(0, 0, 0);
  }
  updateCamera();

  function onPointerDown(x, y) {
    isDragging = true;
    prevX = x;
    prevY = y;
  }
  function onPointerMove(x, y) {
    if (!isDragging) return;
    const dx = x - prevX;
    const dy = y - prevY;
    theta -= dx * 0.005;
    phi -= dy * 0.005;
    phi = Math.max(0.4, Math.min(2.4, phi));
    prevX = x;
    prevY = y;
    updateCamera();
  }
  function onPointerUp() { isDragging = false; }

  renderer.domElement.addEventListener('mousedown', e => onPointerDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onPointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onPointerUp);

  renderer.domElement.addEventListener('touchstart', e => {
    const t = e.touches[0];
    onPointerDown(t.clientX, t.clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', e => {
    const t = e.touches[0];
    onPointerMove(t.clientX, t.clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', onPointerUp);

  renderer.domElement.addEventListener('wheel', e => {
    radiusCam += e.deltaY * 0.01;
    radiusCam = Math.max(4, Math.min(16, radiusCam));
    updateCamera();
  }, { passive: true });

  // ---- Resize ----
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---- Animate ----
  let satTime = 0;
  function animate() {
    requestAnimationFrame(animate);
    coreMesh.rotation.y += 0.0022;
    cloudMesh.rotation.y += 0.0032;
    wireMesh.rotation.y -= 0.0006;
    particles.rotation.y += 0.0004;

    satTime += 0.01;
    satellites.forEach(sat => {
      const d = sat.userData;
      const a = d.angle + satTime * d.speed;
      sat.position.set(
        Math.cos(a) * d.radius,
        Math.sin(d.tilt) * d.radius * 0.4 + Math.sin(a * 0.7) * 0.2,
        Math.sin(a) * d.radius
      );
    });

    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
