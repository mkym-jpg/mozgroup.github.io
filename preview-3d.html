<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOZ WORLD — Concept Preview</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0d1210;
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    height: 100%;
  }
  #scene {
    position: fixed;
    inset: 0;
  }
  .overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px;
    color: #e7e2d6;
  }
  .top-label {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c8834f;
  }
  .title {
    margin-top: 10px;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700;
    letter-spacing: 0.02em;
    max-width: 560px;
  }
  .sub {
    margin-top: 12px;
    font-size: 0.9rem;
    color: #9a9488;
    max-width: 420px;
    line-height: 1.7;
  }
  .hint {
    align-self: flex-end;
    font-size: 0.72rem;
    color: #6f6a5f;
    letter-spacing: 0.05em;
  }
  .badge {
    position: fixed;
    top: 32px;
    right: 32px;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: #4c6a63;
    border: 1px dashed #35443f;
    padding: 6px 12px;
    border-radius: 3px;
  }
</style>
</head>
<body>

<div id="scene"></div>

<div class="overlay">
  <div>
    <div class="top-label">Concept Preview — Not for Production</div>
    <div class="title">MOZ WORLD<br>(構想イメージ)</div>
    <div class="sub">
      将来的にコミュニティ/営業チームが集うプラットフォーム空間の、
      ごく初期の雰囲気テストです。実際の機能・見た目は未確定です。
    </div>
  </div>
  <div class="hint">ドラッグで視点を回転 ・ ホイールで拡大縮小</div>
</div>

<div class="badge">DRAFT 001</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const container = document.getElementById('scene');

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0d1210, 0.045);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 1.2, 9);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // ---- Lights ----
  const ambient = new THREE.AmbientLight(0x2a3530, 1.1);
  scene.add(ambient);

  const copperLight = new THREE.PointLight(0xc9834f, 3.2, 30);
  copperLight.position.set(4, 3, 4);
  scene.add(copperLight);

  const petrolLight = new THREE.PointLight(0x2a5a52, 2.4, 30);
  petrolLight.position.set(-5, -2, -3);
  scene.add(petrolLight);

  // ---- Central emblem (MOZ core) ----
  const coreGroup = new THREE.Group();
  scene.add(coreGroup);

  const coreGeo = new THREE.IcosahedronGeometry(1.6, 1);
  const coreMat = new THREE.MeshStandardMaterial({
    color: 0x9c5c2f,
    metalness: 0.55,
    roughness: 0.35,
    flatShading: true
  });
  const coreMesh = new THREE.Mesh(coreGeo, coreMat);
  coreGroup.add(coreMesh);

  const wireGeo = new THREE.IcosahedronGeometry(1.95, 1);
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x3f6a61,
    wireframe: true,
    transparent: true,
    opacity: 0.5
  });
  const wireMesh = new THREE.Mesh(wireGeo, wireMat);
  coreGroup.add(wireMesh);

  // ---- Ambient particle field ----
  const particleCount = 900;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    const radius = 6 + Math.random() * 14;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos((Math.random() * 2) - 1);
    positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta) * 0.6;
    positions[i * 3 + 2] = radius * Math.cos(phi);
  }
  const particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0xd9a06a,
    size: 0.045,
    transparent: true,
    opacity: 0.6,
    sizeAttenuation: true
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // ---- Ground disc (subtle) ----
  const groundGeo = new THREE.CircleGeometry(8, 64);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x141a17,
    metalness: 0.2,
    roughness: 0.9,
    transparent: true,
    opacity: 0.7
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -2.4;
  scene.add(ground);

  // ---- Manual drag-orbit controls (no OrbitControls addon needed) ----
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let theta = 0.6, phi = 1.3;
  let radiusCam = 9;

  function updateCamera() {
    camera.position.x = radiusCam * Math.sin(phi) * Math.sin(theta);
    camera.position.y = radiusCam * Math.cos(phi) + 1.0;
    camera.position.z = radiusCam * Math.sin(phi) * Math.cos(theta);
    camera.lookAt(0, 0, 0);
  }
  updateCamera();

  function onPointerDown(x, y) {
    isDragging = true;
    prevX = x;
    prevY = y;
  }
  function onPointerMove(x, y) {
    if (!isDragging) return;
    const dx = x - prevX;
    const dy = y - prevY;
    theta -= dx * 0.005;
    phi -= dy * 0.005;
    phi = Math.max(0.4, Math.min(2.4, phi));
    prevX = x;
    prevY = y;
    updateCamera();
  }
  function onPointerUp() { isDragging = false; }

  renderer.domElement.addEventListener('mousedown', e => onPointerDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onPointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onPointerUp);

  renderer.domElement.addEventListener('touchstart', e => {
    const t = e.touches[0];
    onPointerDown(t.clientX, t.clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', e => {
    const t = e.touches[0];
    onPointerMove(t.clientX, t.clientY);
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', onPointerUp);

  renderer.domElement.addEventListener('wheel', e => {
    radiusCam += e.deltaY * 0.01;
    radiusCam = Math.max(4, Math.min(16, radiusCam));
    updateCamera();
  }, { passive: true });

  // ---- Resize ----
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---- Animate ----
  function animate() {
    requestAnimationFrame(animate);
    coreGroup.rotation.y += 0.0025;
    wireMesh.rotation.y -= 0.0015;
    particles.rotation.y += 0.0004;
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
